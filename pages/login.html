<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<style>
    body{
        background : url(../images/login_bg.webp) no-repeat center center fixed;
        background-size: cover; 
    }
    .login-card{
        background-color: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(30px);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        position: relative;
    }
    .form-control{
        background: rgba(255, 255, 255, 0.2) !important;
        color: white !important;
        height: 40px;
        border: none;
    }
    .form-control:focus{
        background: rgba(255, 255, 255, 0.3);

    }
    button.btn-login{
        background-color: rgba(255, 255, 255, 0.8);
        color: #333;
    }
    button.btn-login:hover{
        background-color: rgba(255, 255, 255, 1);
        color: #000;
    }

    .input-group-text {
    background-color:rgba(255, 255, 255, 0.2);
    border: none;
    color: rgb(255, 243, 243);
    }
    .form-control::placeholder {
    color: rgba(255, 255, 255, 0.7);
    opacity: 1;
    }
</style>
<body>   
    <div class="container vh-100">
        <div class="row h-100 justify-content-center align-items-center">
            <div class="col-lg-5 col-md-8">
                <div class="login-card p-5 rounded-4">
                    <h3 class="mb-4 text-white text-center">Login</h3>
                    <form action="">
                        <div class="mb-3">
                            <div class="input-group">
                            <span class="input-group-text border-0">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="email"class="form-control" id="email" placeholder="Enter your email">
                            </div>
                        </div>
                        <div class="mb-3 text-white">
                            <div class="input-group">
                                <span class="input-group-text">
                                        <i class="bi bi-lock"></i>
                                    </span>
                                <input type="password" class="form-control" id="password" placeholder="Enter your password" aria-placeholder="Enter your password">
                            </div>
                        </div>
                        <div class="mb-4">
                            <div class="form-checkbox">
                                <input type="checkbox" id="rememberMe" class="form-check-input">
                                <label for="rememberMe" class="form-check-label text-white">Remember Me</label>
                            </div>
                        </div>
                        <div class="d-grid mb-2">
                        <button type="submit" class="btn btn-light btn-login rounded-3 fw-semibold">Login</button>
                        </div>
                        <p class="mb-0 text-center text-white">Don't have an account? <a href="register.html" class="text-decoration-none text-white fw-bold text-decoration-underline">Register here</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
