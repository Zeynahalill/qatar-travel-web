<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<style>
    body{
        background : url(../images/register_bg.webp) no-repeat center center fixed;
        background-size: cover; 
    }
    .login-card{
        background-color: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(30px);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        position: relative;
    }
    .form-control{
        background: rgba(255, 255, 255, 0.2);
        height: 40px;
        border: none;
    }
    .form-control:focus{
        background: rgba(255, 255, 255, 0.3);

    }
    button.btn-login{
        background-color: rgba(255, 255, 255, 0.8);
        color: #333;
    }
    button.btn-login:hover{
        background-color: rgba(255, 255, 255, 1);
        color: #000;
    }

    .input-group-text {
    background-color:rgba(255, 255, 255, 0.2);
    border: none;
    color: rgb(255, 243, 243);
    }
    .form-control::placeholder {
    color: rgba(255, 255, 255, 0.7);
    opacity: 1;
    }
    .form-control, .form-select, .input-group-text {
    background: rgba(255, 255, 255, 0.2) !important;
    color: white !important;
    border: none
    }

    .form-select {
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='white' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
    }

    .form-select option {
    background-color: #333; 
    color: white;
    }
</style>
<body>   
    <div class="container vh-100">
        <div class="row h-100 justify-content-center align-items-center">
            <div class="col-lg-5 col-md-8">
                <div class="login-card p-5 rounded-4">
                    <h3 class="mb-4 text-white text-center">Register</h3>
                    <form action="">
                        <div class="mb-3">
                            <div class="input-group">
                            <span class="input-group-text border-0">
                                <i class="bi bi-person-plus-fill"></i>
                            </span>
                            <input type="text" class="form-control" id="username" placeholder="Create username">
                        </div>
                        </div>
                        <div class="mb-3">
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-person"></i>
                                </span>
                            <input type="text" class="form-control" id="name" placeholder="Enter your full name">
                            </div>
                        </div>    
                        <div class="mb-3">
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-envelope"></i>
                                </span>
                            <input type="email"class="form-control" id="email" placeholder="Enter your email">
                        </div>
                        </div>
                        <div class="mb-3">
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-telephone"></i>
                                </span>
                                    <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number">
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-globe"></i>
                                </span>
                                    <select class="form-select" id="country">
                                        <option selected disabled>Select your country </option>
                                        <option value="QA">Qatar</option>
                                        <option value="SY">syria</option>
                                        <option value="SA">Sauudi</option>
                                        <option value="TR">Turkey</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3 text-white">
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-person-lock"></i>
                                </span>
                            <input type="password" class="form-control" id="password" placeholder="Create password">
                        </div>
                        </div>
                        <div class="mb-3 text-white">
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-lock"></i>
                                </span>
                                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password">
                            </div>
                        </div>
                        <div class="d-grid mb-2">
                        <button type="submit" class="btn btn-light btn-login rounded-3 fw-semibold">Register</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
